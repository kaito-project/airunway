apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: airunway
    control-plane: controller-manager
  name: airunway-system
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agentdeployments.airunway.ai
spec:
  group: airunway.ai
  names:
    kind: AgentDeployment
    listKind: AgentDeploymentList
    plural: agentdeployments
    shortNames:
    - ad
    singular: agentdeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.framework.name
      name: Framework
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentDeployment is the Schema for the agentdeployments API.

          An AgentDeployment describes one agent instance: which framework
          reconciles it, which model(s) it talks to, and the framework-specific
          configuration that defines its behaviour.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentDeploymentSpec defines the desired state of an AgentDeployment.
            properties:
              config:
                description: |-
                  config carries framework-specific configuration (e.g. system
                  prompt, skills, crew definition, graph definition).

                  The shape is defined by the framework provider, validated against
                  its JSON schema during reconciliation. Use RawExtension here so
                  the core controller does not need to learn every framework's
                  schema; provider controllers parse and validate this field
                  themselves.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              framework:
                description: |-
                  framework selects which agent framework provider reconciles this
                  AgentDeployment. The provider must have a matching
                  AgentProviderConfig registered in the cluster.
                properties:
                  name:
                    description: |-
                      name is the framework identifier, e.g. "kagent", "openclaw",
                      "crewai", "langgraph". Must match an AgentProviderConfig.metadata.name.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                    type: string
                  version:
                    description: |-
                      version optionally pins a framework provider version. When empty,
                      providers use their default version. Format is provider-defined.
                    type: string
                required:
                - name
                type: object
              models:
                description: |-
                  models lists the model endpoints the agent can talk to. At least
                  one entry is required. Each binding is identified by its name,
                  which framework-specific spec.config blobs reference (e.g.
                  {"defaultModel": "reasoning"}). Most agents only need one
                  binding; multi-binding support exists for agents that mix a
                  reasoning model with cheaper utility models.
                items:
                  description: |-
                    ModelBinding describes how the agent connects to one model. Exactly
                    one of deploymentRef, gatewayEndpoint, or externalAPI must be set.

                    The name field is the stable list key within
                    AgentDeploymentSpec.models and is the identifier framework providers
                    reference from spec.config (e.g. {"defaultModel": "reasoning"}). A
                    single-model agent typically uses a name like "default".
                  properties:
                    deploymentRef:
                      description: deploymentRef binds to an in-cluster ModelDeployment.
                      properties:
                        name:
                          description: name is the ModelDeployment name to bind to.
                          minLength: 1
                          type: string
                        namespace:
                          description: |-
                            namespace defaults to the AgentDeployment's namespace when empty.
                            Cross-namespace references require an AgentReferenceGrant (Phase 3).
                          type: string
                      required:
                      - name
                      type: object
                    externalAPI:
                      description: externalAPI binds to an external OpenAI-compatible
                        endpoint.
                      properties:
                        baseURL:
                          description: baseURL is the OpenAI-compatible base URL,
                            e.g. "https://api.openai.com/v1".
                          minLength: 1
                          type: string
                        credentialsRef:
                          description: credentialsRef points at a Secret holding the
                            API credentials.
                          properties:
                            key:
                              description: key inside the Secret to read.
                              minLength: 1
                              type: string
                            name:
                              description: name of the Secret in the AgentDeployment's
                                namespace.
                              minLength: 1
                              type: string
                          required:
                          - key
                          - name
                          type: object
                        modelName:
                          description: modelName is the model identifier the agent
                            will request.
                          minLength: 1
                          type: string
                        type:
                          description: |-
                            type identifies the well-known API shape. Use "custom" for any
                            OpenAI-compatible endpoint not covered by the named types.
                          enum:
                          - openai
                          - anthropic
                          - azureOpenAI
                          - custom
                          type: string
                      required:
                      - baseURL
                      - modelName
                      - type
                      type: object
                    gatewayEndpoint:
                      description: gatewayEndpoint binds to a model exposed through
                        Gateway API (GAIE).
                      properties:
                        gatewayRef:
                          description: gatewayRef points at the Gateway resource that
                            serves the model.
                          properties:
                            name:
                              description: name of the Gateway resource.
                              minLength: 1
                              type: string
                            namespace:
                              description: namespace of the Gateway resource.
                              type: string
                          required:
                          - name
                          type: object
                        modelName:
                          description: modelName is the served model name advertised
                            through the gateway.
                          minLength: 1
                          type: string
                      required:
                      - gatewayRef
                      - modelName
                      type: object
                    name:
                      description: |-
                        name is a stable identifier for this binding within the agent.
                        Used as the list key in AgentDeploymentSpec.models and as the
                        reference key from framework-specific spec.config blobs.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of deploymentRef, gatewayEndpoint, or externalAPI
                      must be set
                    rule: ((has(self.deploymentRef)?1:0)+(has(self.gatewayEndpoint)?1:0)+(has(self.externalAPI)?1:0))
                      == 1
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              observability:
                description: observability configures observability emission (OTLP
                  export).
                properties:
                  otlp:
                    description: |-
                      otlp configures OpenTelemetry export. When set, providers MUST
                      inject OTEL_EXPORTER_OTLP_* environment variables matching this
                      configuration into the rendered agent workload.
                    properties:
                      endpoint:
                        description: endpoint is the OTLP collector endpoint URL.
                        minLength: 1
                        type: string
                      protocol:
                        description: protocol identifies the OTLP transport (http/protobuf,
                          grpc, ...).
                        type: string
                    required:
                    - endpoint
                    type: object
                type: object
              resources:
                description: |-
                  resources sets resource requests/limits for the rendered agent
                  workload. Providers translate this into native scheduling hints
                  (e.g. container resources on a Deployment, or framework-specific
                  fields on a native CR).
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: limits sets the maximum CPU and memory the agent
                      may use.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: requests sets the minimum CPU and memory required
                      for the agent.
                    type: object
                type: object
            required:
            - framework
            - models
            type: object
          status:
            description: |-
              AgentDeploymentStatus defines the observed state of an AgentDeployment.

              Status ownership is split between the core controller and the
              framework provider controller; the field-owner is shown in parens.

                - framework, modelBindings                                    (core)
                - conditions[ModelBound], conditions[FrameworkReady]          (core)
                - conditions[Ready]                                           (core)
                - phase, runtime, replicas, conditions[ProviderReady]         (provider)

              Both writers MUST use server-side apply with distinct field owners
              so the API server itself prevents cross-writes.
            properties:
              conditions:
                description: conditions follow the standard Kubernetes condition pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              framework:
                description: framework is the resolved framework metadata. Owned by
                  core.
                properties:
                  name:
                    description: name is the resolved framework name (mirrors spec.framework.name).
                    type: string
                  providerVersion:
                    description: |-
                      providerVersion is the version reported by the AgentProviderConfig
                      status at resolution time. Useful for debugging skew between the
                      AgentDeployment and the framework provider.
                    type: string
                type: object
              modelBindings:
                description: |-
                  modelBindings is the per-entry resolved binding contract for the
                  framework provider to consume, one element per spec.models entry.
                  Owned by core.
                items:
                  description: |-
                    ModelBindingStatus is a resolved binding the provider should consume.

                    Written exclusively by the core controller. Framework providers MUST
                    read from this rather than re-resolving spec.models themselves, so
                    that the resolution surface (cross-namespace grants, secret lookups,
                    gateway endpoint discovery) lives in exactly one place.
                  properties:
                    baseURL:
                      description: |-
                        baseURL is the resolved OpenAI-compatible base URL for the model
                        endpoint (e.g. http://my-model.inference.svc.cluster.local/v1).
                      type: string
                    bindingMode:
                      description: bindingMode echoes which binding mode in spec.models[name]
                        was used.
                      enum:
                      - deploymentRef
                      - gatewayEndpoint
                      - externalAPI
                      type: string
                    credentialsRef:
                      description: |-
                        credentialsRef points at a Secret with credentials the agent
                        should mount. Empty when no credentials are required.
                      properties:
                        key:
                          description: key inside the Secret to read.
                          minLength: 1
                          type: string
                        name:
                          description: name of the Secret in the AgentDeployment's
                            namespace.
                          minLength: 1
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    modelName:
                      description: modelName is the model identifier the agent should
                        request.
                      type: string
                    name:
                      description: |-
                        name mirrors the spec.models[*].name list key so providers can
                        match each resolved binding back to its declared entry. This is
                        also the list key on status.modelBindings.
                      type: string
                    observedResourceUID:
                      description: |-
                        observedResourceUID is the UID of the underlying resource (e.g.
                        the ModelDeployment for deploymentRef bindings). The core
                        controller uses this to detect delete+recreate so providers
                        re-render agents when the upstream resource changes identity.
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  observedGeneration is the AgentDeployment.metadata.generation
                  observed by the core controller.
                format: int64
                type: integer
              phase:
                description: phase is the high-level lifecycle phase. Owned by the
                  framework provider.
                enum:
                - Pending
                - Deploying
                - Running
                - Failed
                - Terminating
                type: string
              replicas:
                description: |-
                  replicas summarises desired/ready instance counts. Owned by the
                  framework provider.
                properties:
                  available:
                    description: |-
                      available is the count of instances that have been ready for at
                      least minReadySeconds (per the underlying workload's definition
                      of available, e.g. apps/v1.Deployment.status.availableReplicas).
                    format: int32
                    type: integer
                  desired:
                    description: desired is the desired number of agent instances.
                    format: int32
                    type: integer
                  ready:
                    description: ready is the count of instances reporting ready.
                    format: int32
                    type: integer
                type: object
              runtime:
                description: runtime describes the rendered workload. Owned by the
                  framework provider.
                properties:
                  address:
                    description: |-
                      address is the in-cluster service URL the agent is reachable at,
                      when applicable.
                    type: string
                  workloadRef:
                    description: |-
                      workloadRef points at the framework-native resource the provider
                      created (e.g. Kagent Agent CR, plain Deployment).
                    properties:
                      apiVersion:
                        description: apiVersion of the backing resource (e.g. "kagent.dev/v1alpha1",
                          "apps/v1").
                        type: string
                      kind:
                        description: kind of the backing resource (e.g. "Agent", "Deployment").
                        type: string
                      name:
                        description: name of the backing resource.
                        type: string
                      namespace:
                        description: namespace of the backing resource. Empty for
                          cluster-scoped resources.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agentproviderconfigs.airunway.ai
spec:
  group: airunway.ai
  names:
    kind: AgentProviderConfig
    listKind: AgentProviderConfigList
    plural: agentproviderconfigs
    shortNames:
    - apc
    singular: agentproviderconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .spec.capabilities.backend
      name: Backend
      type: string
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentProviderConfig registers an agent framework with AI Runway. It is
          the agent-marketplace analogue of InferenceProviderConfig.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentProviderConfigSpec defines the registration for an agent
              framework provider.
            properties:
              capabilities:
                description: capabilities declares what this framework supports.
                properties:
                  backend:
                    description: |-
                      backend identifies the rendering strategy this provider uses. See
                      AgentProviderBackend for values.
                    enum:
                    - crd
                    - container
                    type: string
                  modelBindingModes:
                    description: |-
                      modelBindingModes is the set of model-binding modes the framework
                      implementation natively supports. The core controller refuses
                      AgentDeployments whose binding mode is not in this set.
                    items:
                      description: ModelBindingMode identifies how the agent resolves
                        its model endpoint.
                      enum:
                      - deploymentRef
                      - gatewayEndpoint
                      - externalAPI
                      type: string
                    type: array
                  protocols:
                    description: |-
                      protocols is the set of tool/agent protocols the framework
                      natively understands.
                    items:
                      description: |-
                        AgentToolProtocol identifies a tool-calling protocol the framework
                        can natively consume.
                      enum:
                      - mcp
                      - a2a
                      - openaiTools
                      type: string
                    type: array
                  requiresOperator:
                    description: |-
                      requiresOperator indicates the framework relies on an upstream
                      Kubernetes operator/CRD being installed in the cluster (e.g.
                      Kagent). The dashboard uses this to gate "install upstream"
                      flows. Mirrors InferenceProviderConfig.requiresCRD semantics.
                    type: boolean
                type: object
              catalog:
                description: |-
                  catalog lists deployable recipes (curated model+agent combos)
                  the dashboard surfaces under this framework on the marketplace
                  page. Recipes are not required; a provider can register
                  itself with no catalog and still accept hand-written
                  AgentDeployments.
                items:
                  description: |-
                    AgentCatalogItem is a curated, one-click deployable recipe. The
                    dashboard renders these on the marketplace browse page; selecting
                    one prefills the deploy wizard with the bundled template.

                    Inspired by vLLM production-stack recipes: shipping known-good
                    combinations of model + framework + config eliminates the empty-form
                    experience and matches the Ollama-style "one-line launch" UX target.
                  properties:
                    description:
                      description: description explains what the recipe does, in plain
                        language.
                      type: string
                    icon:
                      description: icon is an optional URL to an icon shown in the
                        catalog tile.
                      type: string
                    image:
                      description: |-
                        image is the container image the catalog item runs when the
                        provider's backend is "container". Ignored for CRD-backed
                        providers, where the framework operator owns image selection.

                        Carrying the image at the catalog level lets a single container-
                        based provider serve many frameworks (OpenClaw, CrewAI,
                        LangGraph, Hermes) by varying the catalog entry rather than the
                        provider code.
                      type: string
                    name:
                      description: |-
                        name is a stable, machine-readable identifier within the catalog
                        (e.g. "kagent-k8s-sre", "openclaw-personal-assistant").
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                      type: string
                    recommendedSecurity:
                      description: |-
                        recommendedSecurity ships sensible security defaults for this
                        recipe, applied by the framework provider when it renders the
                        agent workload. Security posture is provider-owned rather than set
                        per AgentDeployment. Per-recipe defaults are required because agent
                        frameworks have legitimately different requirements (e.g.
                        OpenClaw writes the local file system, so it cannot run with
                        readOnlyRootFilesystem=true).
                      properties:
                        containerSecurityContext:
                          description: |-
                            containerSecurityContext is a container-level SecurityContext
                            override applied to the agent's primary container. Use this for
                            settings that live on the container (e.g. readOnlyRootFilesystem,
                            allowPrivilegeEscalation, capabilities) which cannot be expressed
                            via the pod-level securityContext. Provider defaults (from the
                            AgentProviderConfig catalog entry) are used when this is unset;
                            non-nil fields here override the provider defaults field-by-field.
                          properties:
                            allowPrivilegeEscalation:
                              description: |-
                                AllowPrivilegeEscalation controls whether a process can gain more
                                privileges than its parent process. This bool directly controls if
                                the no_new_privs flag will be set on the container process.
                                AllowPrivilegeEscalation is true always when the container is:
                                1) run as Privileged
                                2) has CAP_SYS_ADMIN
                                Note that this field cannot be set when spec.os.name is windows.
                              type: boolean
                            appArmorProfile:
                              description: |-
                                appArmorProfile is the AppArmor options to use by this container. If set, this profile
                                overrides the pod's appArmorProfile.
                                Note that this field cannot be set when spec.os.name is windows.
                              properties:
                                localhostProfile:
                                  description: |-
                                    localhostProfile indicates a profile loaded on the node that should be used.
                                    The profile must be preconfigured on the node to work.
                                    Must match the loaded name of the profile.
                                    Must be set if and only if type is "Localhost".
                                  type: string
                                type:
                                  description: |-
                                    type indicates which kind of AppArmor profile will be applied.
                                    Valid options are:
                                      Localhost - a profile pre-loaded on the node.
                                      RuntimeDefault - the container runtime's default profile.
                                      Unconfined - no AppArmor enforcement.
                                  type: string
                              required:
                              - type
                              type: object
                            capabilities:
                              description: |-
                                The capabilities to add/drop when running containers.
                                Defaults to the default set of capabilities granted by the container runtime.
                                Note that this field cannot be set when spec.os.name is windows.
                              properties:
                                add:
                                  description: Added capabilities
                                  items:
                                    description: Capability represent POSIX capabilities
                                      type
                                    type: string
                                  type: array
                                  x-kubernetes-list-type: atomic
                                drop:
                                  description: Removed capabilities
                                  items:
                                    description: Capability represent POSIX capabilities
                                      type
                                    type: string
                                  type: array
                                  x-kubernetes-list-type: atomic
                              type: object
                            privileged:
                              description: |-
                                Run container in privileged mode.
                                Processes in privileged containers are essentially equivalent to root on the host.
                                Defaults to false.
                                Note that this field cannot be set when spec.os.name is windows.
                              type: boolean
                            procMount:
                              description: |-
                                procMount denotes the type of proc mount to use for the containers.
                                The default value is Default which uses the container runtime defaults for
                                readonly paths and masked paths.
                                This requires the ProcMountType feature flag to be enabled.
                                Note that this field cannot be set when spec.os.name is windows.
                              type: string
                            readOnlyRootFilesystem:
                              description: |-
                                Whether this container has a read-only root filesystem.
                                Default is false.
                                Note that this field cannot be set when spec.os.name is windows.
                              type: boolean
                            runAsGroup:
                              description: |-
                                The GID to run the entrypoint of the container process.
                                Uses runtime default if unset.
                                May also be set in PodSecurityContext.  If set in both SecurityContext and
                                PodSecurityContext, the value specified in SecurityContext takes precedence.
                                Note that this field cannot be set when spec.os.name is windows.
                              format: int64
                              type: integer
                            runAsNonRoot:
                              description: |-
                                Indicates that the container must run as a non-root user.
                                If true, the Kubelet will validate the image at runtime to ensure that it
                                does not run as UID 0 (root) and fail to start the container if it does.
                                If unset or false, no such validation will be performed.
                                May also be set in PodSecurityContext.  If set in both SecurityContext and
                                PodSecurityContext, the value specified in SecurityContext takes precedence.
                              type: boolean
                            runAsUser:
                              description: |-
                                The UID to run the entrypoint of the container process.
                                Defaults to user specified in image metadata if unspecified.
                                May also be set in PodSecurityContext.  If set in both SecurityContext and
                                PodSecurityContext, the value specified in SecurityContext takes precedence.
                                Note that this field cannot be set when spec.os.name is windows.
                              format: int64
                              type: integer
                            seLinuxOptions:
                              description: |-
                                The SELinux context to be applied to the container.
                                If unspecified, the container runtime will allocate a random SELinux context for each
                                container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
                                PodSecurityContext, the value specified in SecurityContext takes precedence.
